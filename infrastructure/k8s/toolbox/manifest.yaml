apiVersion: v1
kind: Pod
metadata:
  name: toolbox
  namespace: technomart
  labels:
    app: toolbox
spec:
  containers:
    - name: toolbox
      image: 192.168.56.10:32500/technomart-toolbox:latest
      imagePullPolicy: Always
      command: ["sleep", "infinity"]
      env:
        - name: PGHOST
          value: postgresql.technomart.svc.cluster.local
        - name: PGPORT
          value: "5432"
        - name: PGDATABASE
          value: technomart
        - name: PGUSER
          value: technomart
        - name: PGPASSWORD
          value: technomart
        - name: AWS_ACCESS_KEY_ID
          value: test
        - name: AWS_SECRET_ACCESS_KEY
          value: test
        - name: AWS_DEFAULT_REGION
          value: ap-northeast-1
      resources:
        requests:
          cpu: "50m"
          memory: "128Mi"
        limits:
          cpu: "200m"
          memory: "256Mi"
  restartPolicy: Always
