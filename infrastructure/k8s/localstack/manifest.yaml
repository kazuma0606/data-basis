# LocalStack - S3 互換ストレージ
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: localstack
  namespace: technomart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: localstack
  template:
    metadata:
      labels:
        app: localstack
    spec:
      containers:
        - name: localstack
          image: localstack/localstack:3.8
          env:
            - name: SERVICES
              value: s3
            - name: AWS_DEFAULT_REGION
              value: ap-northeast-1
            - name: PERSISTENCE
              value: "1"
          ports:
            - containerPort: 4566
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "1Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/localstack
          readinessProbe:
            httpGet:
              path: /_localstack/health
              port: 4566
            initialDelaySeconds: 15
            periodSeconds: 5
      volumes:
        - name: data
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: localstack
  namespace: technomart
spec:
  type: NodePort
  selector:
    app: localstack
  ports:
    - port: 4566
      targetPort: 4566
      nodePort: 34566
