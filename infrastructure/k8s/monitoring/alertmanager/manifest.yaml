---
# NOTE: この Secret は git に URL を含めないため、manifest から除外。
# 初回セットアップ時は以下のコマンドで適用してください:
#   kubectl create secret generic alertmanager-secret -n monitoring \
#     --from-literal=SLACK_WEBHOOK_URL="<実際のURL>" \
#     --dry-run=client -o yaml | kubectl apply -f -
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      # Slack webhook URL は Secret からマウントしたファイルで参照（git に URL を含めない）
      slack_api_url_file: /etc/alertmanager/slack-webhook-url
      resolve_timeout: 5m

    route:
      group_by: [alertname, severity]
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: default
      routes:
        - matchers:
            - severity = "critical"
          receiver: slack-critical
          continue: false
        - matchers:
            - severity = "warning"
          receiver: slack-warning
          continue: false

    receivers:
      - name: default
        slack_configs:
          - send_resolved: true
            title: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }}:{{ .Alerts.Firing | len }}{{ end }}] {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}{{ .Annotations.description }}{{ end }}'

      - name: slack-critical
        slack_configs:
          - send_resolved: true
            title: ':red_circle: CRITICAL [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}*Alert:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}{{ end }}'

      - name: slack-warning
        slack_configs:
          - send_resolved: true
            title: ':warning: WARNING [{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
            text: '{{ range .Alerts }}*Alert:* {{ .Annotations.summary }}\n*Description:* {{ .Annotations.description }}{{ end }}'

    inhibit_rules:
      - source_matchers:
          - severity = "critical"
        target_matchers:
          - severity = "warning"
        equal: [alertname, namespace]
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager
  template:
    metadata:
      labels:
        app: alertmanager
    spec:
      containers:
        - name: alertmanager
          image: prom/alertmanager:v0.27.0
          args:
            - --config.file=/etc/alertmanager/alertmanager.yml
            - --storage.path=/alertmanager
          ports:
            - containerPort: 9093
          resources:
            requests:
              cpu: 20m
              memory: 64Mi
            limits:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
            - name: config
              mountPath: /etc/alertmanager/alertmanager.yml
              subPath: alertmanager.yml
            - name: slack-secret
              mountPath: /etc/alertmanager/slack-webhook-url
              subPath: SLACK_WEBHOOK_URL
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: alertmanager-config
        - name: slack-secret
          secret:
            secretName: alertmanager-secret
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager
  namespace: monitoring
spec:
  selector:
    app: alertmanager
  ports:
    - port: 9093
      targetPort: 9093
      nodePort: 30993
  type: NodePort
