apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-alert-rules
  namespace: monitoring
data:
  alert-rules.yml: |
    groups:
      - name: kafka
        rules:
          - alert: KafkaConsumerLagHigh
            expr: kafka_consumer_group_lag > 10000
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Kafka consumer lag high ({{ $value }})"
              description: "Consumer group {{ $labels.consumergroup }} lag > 10,000 for 5 minutes"

          - alert: KafkaConsumerLagCritical
            expr: kafka_consumer_group_lag > 50000
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Kafka consumer lag critical ({{ $value }})"
              description: "Consumer group {{ $labels.consumergroup }} lag > 50,000"

      - name: postgresql
        rules:
          - alert: PostgresDown
            expr: pg_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "PostgreSQL is down"
              description: "PostgreSQL instance {{ $labels.instance }} is down"

          - alert: PostgresConnectionsHigh
            expr: pg_stat_activity_count > pg_settings_max_connections * 0.8
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "PostgreSQL connections above 80%"

      - name: clickhouse
        rules:
          - alert: ClickHouseDown
            expr: clickhouse_up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "ClickHouse is down"
              description: "ClickHouse instance {{ $labels.instance }} is down"

      - name: pods
        rules:
          - alert: PodOOMKilled
            expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} > 0
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Pod OOMKilled: {{ $labels.pod }}"
              description: "Container {{ $labels.container }} in pod {{ $labels.pod }} was OOMKilled"

          - alert: PodRestartLoop
            expr: increase(kube_pod_container_status_restarts_total[1h]) > 5
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Pod restart loop: {{ $labels.pod }}"
              description: "Pod {{ $labels.pod }} has restarted more than 5 times in 1 hour"

      - name: disk
        rules:
          - alert: DiskPressureWarning
            expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} > 0.80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Disk usage above 80%"
              description: "Node disk usage is {{ $value | humanizePercentage }}. Run: sudo lvextend -l +100%FREE /dev/ubuntu-vg/ubuntu-lv && sudo resize2fs /dev/ubuntu-vg/ubuntu-lv"

          - alert: DiskPressureCritical
            expr: (node_filesystem_size_bytes{mountpoint="/"} - node_filesystem_free_bytes{mountpoint="/"}) / node_filesystem_size_bytes{mountpoint="/"} > 0.95
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Disk usage above 95%"
              description: "Node disk usage is {{ $value | humanizePercentage }}"

      - name: batch
        rules:
          - alert: BatchJobStalenessDaily
            expr: time() - job_last_success_timestamp > 90000
            for: 0m
            labels:
              severity: critical
            annotations:
              summary: "Batch job stale: {{ $labels.job }}"
              description: "Batch job {{ $labels.job }} has not succeeded in 25h+"
