# Next.js フロントエンド
# ローカル(k3s): NodePort 30300 でブラウザアクセス
# 本番(EKS):    ConfigMap の BACKEND_URL と Secret を差し替えるだけで移行可能
---
# ── ConfigMap: 非機密設定 ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: technomart
data:
  # k3s クラスタ内部から backend Service に接続
  BACKEND_URL: "http://backend.technomart.svc.cluster.local:8000"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_ENV: "production"
  # HTTP アクセス時はクッキーの Secure フラグを無効化（本番 HTTPS では "true" に変更）
  SECURE_COOKIES: "false"
---
# ── Secret: 機密情報 ───────────────────────────────────────────
# 本番では kubectl create secret generic frontend-secret \
#   --from-literal=AUTH_COOKIE_SECRET=$(openssl rand -hex 32) \
#   -n technomart
# ローカル開発用のダミー値（本番では上記コマンドで上書きする）
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: technomart
type: Opaque
stringData:
  AUTH_COOKIE_SECRET: "change-me-generate-with-openssl-rand-hex-32"
---
# ── Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: technomart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
        - name: frontend
          image: technomart-frontend:latest
          imagePullPolicy: Never  # k3s ローカルインポート済みイメージを使用
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          readinessProbe:
            httpGet:
              path: /auth/login
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /auth/login
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
---
# ── Service: ClusterIP（内部アクセス用） + NodePort（外部アクセス用） ──
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: technomart
spec:
  type: NodePort
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
      nodePort: 30300
