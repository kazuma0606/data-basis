# Next.js フロントエンド
# ローカル(k3s): NodePort 30300 でブラウザアクセス
# 本番(EKS):    ConfigMap の BACKEND_URL と Secret を差し替えるだけで移行可能
---
# ── ServiceAccount ─────────────────────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: frontend-sa
  namespace: technomart
---
# ── Role: technomart namespace 内の Pod 読み取りのみ ───────────
# namespace スコープの Role で technomart 以外には効かない
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: technomart-pod-reader
  namespace: technomart
rules:
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
# ── RoleBinding ────────────────────────────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: frontend-pod-reader
  namespace: technomart
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: technomart-pod-reader
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: technomart
---
# ── ClusterRole: Node 読み取りのみ（Node はクラスタースコープ）──
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: technomart-node-reader
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "list"]
---
# ── ClusterRoleBinding: Node 読み取り ──────────────────────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: frontend-node-reader
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: technomart-node-reader
subjects:
  - kind: ServiceAccount
    name: frontend-sa
    namespace: technomart
---
# ── ConfigMap: 非機密設定 ──────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontend-config
  namespace: technomart
data:
  # k3s クラスタ内部から backend Service に接続
  BACKEND_URL: "http://backend.technomart.svc.cluster.local:8000"
  NEXT_TELEMETRY_DISABLED: "1"
  NODE_ENV: "production"
  # Ingress 経由で HTTPS アクセスするため Secure Cookie を有効化
  SECURE_COOKIES: "true"
  # k8s API の TLS 検証に使う CA 証明書（SA トークンと同じパスに自動マウントされる）
  NODE_EXTRA_CA_CERTS: "/var/run/secrets/kubernetes.io/serviceaccount/ca.crt"
---
# ── Secret: 機密情報 ───────────────────────────────────────────
# 本番では kubectl create secret generic frontend-secret \
#   --from-literal=AUTH_COOKIE_SECRET=$(openssl rand -hex 32) \
#   -n technomart
# ローカル開発用のダミー値（本番では上記コマンドで上書きする）
apiVersion: v1
kind: Secret
metadata:
  name: frontend-secret
  namespace: technomart
type: Opaque
stringData:
  AUTH_COOKIE_SECRET: "change-me-generate-with-openssl-rand-hex-32"
---
# ── Deployment ─────────────────────────────────────────────────
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: technomart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      serviceAccountName: frontend-sa
      containers:
        - name: frontend
          image: 192.168.56.10:32500/technomart-frontend:latest
          imagePullPolicy: Always  # ローカルレジストリから毎回pull
          ports:
            - containerPort: 3000
          envFrom:
            - configMapRef:
                name: frontend-config
            - secretRef:
                name: frontend-secret
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: versions-db
              mountPath: /technomart/versions
              readOnly: true
          readinessProbe:
            httpGet:
              path: /auth/login
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /auth/login
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 20
      volumes:
        - name: versions-db
          hostPath:
            path: /technomart/versions
            type: Directory
---
# ── Service: ClusterIP（Ingress 経由のみ。NodePort 廃止）──────────
# 本番(EKS): type: ClusterIP のまま ALB Ingress 経由でアクセス
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: technomart
spec:
  type: ClusterIP
  selector:
    app: frontend
  ports:
    - port: 3000
      targetPort: 3000
