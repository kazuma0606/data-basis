# PostgreSQL + pgvector
# pgvector/pgvector:pg16 イメージを使用（bitnami chartでは pgvector 非対応のため plain manifest）
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: postgresql-pvc
  namespace: technomart
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 20Gi
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: postgresql-init
  namespace: technomart
data:
  init.sql: |
    -- pgvector 拡張を有効化
    CREATE EXTENSION IF NOT EXISTS vector;

    -- 統合顧客マスタ（名寄せ済み）
    CREATE TABLE IF NOT EXISTS unified_customers (
      id            UUID PRIMARY KEY DEFAULT gen_random_uuid(),
      canonical_name VARCHAR(255),
      email         VARCHAR(255),
      phone         VARCHAR(50),
      birth_date    DATE,
      prefecture    VARCHAR(50),
      created_at    TIMESTAMPTZ DEFAULT NOW(),
      updated_at    TIMESTAMPTZ DEFAULT NOW()
    );

    -- 各システムIDと統合IDの対応表
    CREATE TABLE IF NOT EXISTS customer_source_map (
      unified_id    UUID REFERENCES unified_customers(id),
      source        VARCHAR(20) NOT NULL,  -- 'ec', 'pos', 'app'
      source_id     VARCHAR(100) NOT NULL,
      PRIMARY KEY (source, source_id)
    );

    -- チャーン分類
    CREATE TABLE IF NOT EXISTS churn_labels (
      unified_id    UUID PRIMARY KEY REFERENCES unified_customers(id),
      label         VARCHAR(20) NOT NULL,  -- 'active', 'dormant', 'churn'
      score         FLOAT,
      updated_at    TIMESTAMPTZ DEFAULT NOW()
    );

    -- 商品 Embedding（nomic-embed-text, 768次元）
    CREATE TABLE IF NOT EXISTS product_embeddings (
      product_id    VARCHAR(100) PRIMARY KEY,
      source        VARCHAR(10) NOT NULL,  -- 'ec', 'pos'
      embedding     vector(768),
      updated_at    TIMESTAMPTZ DEFAULT NOW()
    );
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgresql
  namespace: technomart
spec:
  replicas: 1
  selector:
    matchLabels:
      app: postgresql
  template:
    metadata:
      labels:
        app: postgresql
    spec:
      containers:
        - name: postgresql
          image: pgvector/pgvector:pg16
          env:
            - name: POSTGRES_DB
              value: technomart
            - name: POSTGRES_USER
              value: technomart
            - name: POSTGRES_PASSWORD
              value: technomart
          ports:
            - containerPort: 5432
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "1"
              memory: "2Gi"
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
            - name: init
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "technomart", "-d", "technomart"]
            initialDelaySeconds: 10
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: postgresql-pvc
        - name: init
          configMap:
            name: postgresql-init
---
apiVersion: v1
kind: Service
metadata:
  name: postgresql
  namespace: technomart
spec:
  type: NodePort
  selector:
    app: postgresql
  ports:
    - port: 5432
      targetPort: 5432
      nodePort: 32432
